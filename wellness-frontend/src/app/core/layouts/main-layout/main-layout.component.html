<div class="layout-container">
  <app-sidebar [collapsed]="sidebarCollapsed()" (toggle)="toggleSidebar()" [mobileOpen]="!sidebarCollapsed()"></app-sidebar>
  
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" *ngIf="!sidebarCollapsed()" (click)="toggleSidebar()"></div>

  <div class="main-wrapper" [class.expanded]="sidebarCollapsed()">
    <app-topbar (toggleSidebar)="toggleSidebar()"></app-topbar>
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
